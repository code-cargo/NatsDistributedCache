name: Publish

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

defaults:
  run:
    shell: bash

jobs:
  nuget:
    name: NuGet
    environment: nuget
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      actions: read
      id-token: write
    steps:
    - name: CargoWall
      uses: code-cargo/cargowall-action@78f9fbcb3561c6ad9289e5b740616216e8cbd232 # v1.3.5
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Setup dotnet
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
      with:
        cache: true
        cache-dependency-path: '**/packages.linux-x64.lock.json'
        dotnet-version: |
          8.x
          10.x

    - name: Write strong name key file
      run: |
        set +x # Disable command echoing for security
        # Base64 decode the strong name key and save to keys directory
        echo "$STRONG_NAME_KEY" | base64 -d > keys/NatsDistributedCache.2025-05-12.snk
        chmod 600 keys/NatsDistributedCache.2025-05-12.snk

        # Verify using the Docker-based script
        ./dev/verify-snk.sh
      env:
        STRONG_NAME_KEY: ${{secrets.STRONG_NAME_KEY}}

    - name: Pack
      run: dotnet pack -c Release -p:version=${GITHUB_REF#refs/*/v} -o ./publish

    - name: Log in to NuGet.org with Trusted Publishing (OIDC)
      uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
      id: nuget-login
      with:
        user: codecargo-cloudadmin

    - name: Publish to NuGet.org
      run: dotnet nuget push ./publish/*.nupkg --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
